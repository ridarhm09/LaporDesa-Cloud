name: Deploy ECS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker Image
        run: |
          docker build -t lapordesa-backend ./backend

      - name: Tag Docker Image
        run: |
          docker tag lapordesa-backend:latest YOUR_ECR_URI:latest

      - name: Push Docker Image
        run: |
          docker push 848928399005.dkr.ecr.ap-southeast-2.amazonaws.com/lapordesa-backend:latest

      - name: Force ECS Deployment
        run: |
          aws ecs update-service \
          --cluster lapordesa \
          --service lapordesa-backend-task-service \
          --force-new-deployment